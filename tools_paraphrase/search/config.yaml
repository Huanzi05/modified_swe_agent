tools:
  find_file:
    signature: "find_file <file_name> [<dir>]"
    docstring: "Locate all files matching the specified name or pattern within dir. If dir is not specified, search the current directory."
    arguments:
      - name: file_name
        type: string
        description: "the name of the file or pattern to search for. supports shell-style wildcards (e.g. *.py)"
        required: true
      - name: dir
        type: string
        description: "the directory to search in (if not provided, searches in the current directory)"
        required: false
  search_dir:
    signature: "search_dir <search_term> [<dir>]"
    docstring: "Search for search_term in every file within dir. If dir is not specified, search in the current directory."
    arguments:
      - name: search_term
        type: string
        description: "the term to search for"
        required: true
      - name: dir
        type: string
        description: "the directory to search in (if not provided, searches in the current directory)"
        required: false
  search_file:
    signature: "search_file <search_term> [<file>]"
    docstring: "Search for search_term within file. If file is not specified, search in the currently open file."
    arguments:
      - name: search_term
        type: string
        description: "the term to search for"
        required: true
      - name: file
        type: string
        description: "the file to search in (if not provided, searches in the current open file)"
        required: false
